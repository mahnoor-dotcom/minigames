<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Multi-Game Platform{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% if session.get('username') %}
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">🎮 MultiGames</a>
            <div class="nav-menu">
                <a href="/" class="nav-link">Dashboard</a>
                <a href="/leaderboard" class="nav-link">Leaderboard</a>
                <div class="user-info">
                    <span class="username">{{ session.get('username') }}</span>
                    <a href="/logout" class="nav-link logout-btn">Logout</a>
                </div>
            </div>
        </div>
    </nav>
    {% endif %}

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; 2026 Multi-Game Platform. All rights reserved.</p>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
